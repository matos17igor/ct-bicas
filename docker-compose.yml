services:
  # Serviço 1: Banco de Dados
  database:
    image: postgres:15-alpine
    container_name: ctbicas_postgres_container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Serviço 2: API Node.js
  api:
    build: ./backend # Aponta para a pasta onde está o Dockerfile do backend
    container_name: ctbicas_api_container
    ports:
      - "3000:3000" # Mapeia a porta da API
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@database:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - database # Diz para o Docker que a API só pode ligar DEPOIS que o banco estiver pronto

  # Serviço 3: Frontend React
  frontend:
    build: ./frontend # Aponta para a pasta do frontend
    container_name: ctbicas_frontend_container
    ports:
      - "5173:5173" # Mapeia a porta do site
    depends_on:
      - api # O site só liga depois que a API estiver de pé

volumes:
  postgres_data:
